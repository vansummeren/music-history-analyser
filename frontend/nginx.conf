server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so the backend service name is resolved at
    # request time rather than once at startup.  Without this, nginx resolves
    # all upstream hostnames when the worker processes start — if the backend
    # container is not yet available at that moment, nginx emits an
    # "host not found in upstream" error and refuses to start, causing a
    # restart loop until the backend comes up.
    resolver 127.0.0.11 valid=30s;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Backend API proxy ─────────────────────────────────────────────────────
    # All /api/* requests are forwarded to the backend container.  The proxy
    # sets X-Forwarded-* headers so the backend can reconstruct the public URL
    # correctly (required for OIDC redirect-URI auto-detection).
    location /api/ {
        # Assigning the upstream to a variable (combined with the resolver
        # directive above) forces nginx to look up the name via DNS on each
        # request instead of at startup.  This prevents the container from
        # failing to start when the backend is not yet running.
        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;

        # Allow larger bodies for SAML POST assertions
        client_max_body_size 1m;
    }

    # Serve static assets with long cache TTL
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all non-file routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
