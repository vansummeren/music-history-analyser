services:
  db:
    image: postgres:16-alpine
    env_file:
      - ${STACK_ENV_FILE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    networks:
      - internal
    env_file:
      - ${STACK_ENV_FILE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m

  backend:
    image: ghcr.io/vansummeren/music-history-analyser-backend:${IMAGE_TAG:-latest}
    env_file:
      - ${STACK_ENV_FILE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    image: ghcr.io/vansummeren/music-history-analyser-backend:${IMAGE_TAG:-latest}
    env_file:
      - ${STACK_ENV_FILE}
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  beat:
    image: ghcr.io/vansummeren/music-history-analyser-backend:${IMAGE_TAG:-latest}
    env_file:
      - ${STACK_ENV_FILE}
    command: celery -A app.tasks.celery_app beat --loglevel=info --pidfile=/tmp/celerybeat.pid --schedule=/var/lib/celerybeat/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    volumes:
      - celerybeat_data:/var/lib/celerybeat
    deploy:
      resources:
        limits:
          memory: 64m

  frontend:
    image: ghcr.io/vansummeren/music-history-analyser-frontend:${IMAGE_TAG:-latest}
    env_file:
      - ${STACK_ENV_FILE}
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    networks:
      - internal
    env_file:
      - ${STACK_ENV_FILE}
    environment:
      - TUNNEL_TRANSPORT_PROTOCOL=http2
    depends_on:
      - frontend

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/db
  celerybeat_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/beat

networks:
  internal:
