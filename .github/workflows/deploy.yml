name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    # Only deploy when the CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "app_version=$(jq -r .version frontend/package.json)" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/music-history-analyser-backend:latest
            ghcr.io/${{ github.repository_owner }}/music-history-analyser-backend:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/music-history-analyser-frontend:latest
            ghcr.io/${{ github.repository_owner }}/music-history-analyser-frontend:${{ github.sha }}
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: trigger a deploy webhook on the Docker host
