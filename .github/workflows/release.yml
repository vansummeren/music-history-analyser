name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2026.3.1)"
        required: true
        default: "2026.3.1"
      prerelease:
        description: "Mark as pre-release"
        required: true
        type: boolean
        default: true

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.version }}" \
            -m "Release ${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

      - name: Create and push latest tag
        run: |
          git tag -f -a latest \
            -m "Latest release: ${{ github.event.inputs.version }}"
          git push -f origin latest

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Pull out the section for the requested version from CHANGELOG.md
          VERSION="${{ github.event.inputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/release-notes.md
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release-notes.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Amadeus ${{ github.event.inputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          prerelease: ${{ github.event.inputs.prerelease }}
          make_latest: true
