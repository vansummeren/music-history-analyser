[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = [
  # FastAPI uses Depends() as a default-argument value — this is idiomatic and intentional.
  "B008",
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
