services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: musicanalyser
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    env_file: .env
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      target: development
    env_file: .env
    command: celery -A app.tasks.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
      target: development
    env_file: .env
    command: celery -A app.tasks.celery_app beat --loglevel=info --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: build
    ports:
      - "3000:3000"
    command: npm run dev -- --host
    environment:
      # Allows the Vite dev-server proxy to reach the backend container by its
      # Docker service name instead of relying on localhost port-forwarding.
      VITE_BACKEND_URL: http://backend:8000
    networks:
      - internal
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
